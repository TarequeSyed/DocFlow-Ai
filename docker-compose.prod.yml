services:
  postgres:
    image: pgvector/pgvector:0.8.4-pg16
    container_name: docuflow_postgres_prod
    restart: always
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-docuflow_db}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-docuflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docuflow_backend_prod
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - ENVIRONMENT=production
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-docuflow_db}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres_secure_password@postgres:5432/docuflow_db}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-fastembed}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - FASTEMBED_MODEL=${FASTEMBED_MODEL:-BAAI/bge-small-en-v1.5}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - uploads_data_prod:${UPLOAD_DIR:-/app/uploads}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docuflow_frontend_prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=/api/v1
    depends_on:
      - backend

volumes:
  postgres_data_prod:
    name: docuflow_postgres_data_prod
  uploads_data_prod:
    name: docuflow_uploads_data_prod
